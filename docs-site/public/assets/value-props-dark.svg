<svg viewBox="0 0 1080 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="vpTitle vpDesc">
  <title id="vpTitle">No account, no upload, no subscription</title>
  <desc id="vpDesc">No account: nothing to sign up for, ever. No upload: your files never leave your Mac. No subscription: free and open source, Apache 2.0 licensed.</desc>
  <defs>
    <linearGradient id="vPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset="0.55" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0A1A1A"/>
    </linearGradient>
    <linearGradient id="vCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111C2E"/>
      <stop offset="1" stop-color="#0C1424"/>
    </linearGradient>
    <pattern id="vDots" x="24" y="24" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#334155" opacity="0.18"/>
    </pattern>
    <style>
      .veye  { font: 700 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; letter-spacing: 1.2px; }
      .vbody { font: 450 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #94A3B8; }
      .vico  { stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; fill: none; }

      @keyframes vbreathe { 0%,100% { opacity: 0.1 } 50% { opacity: 0.28 } }
      @keyframes vfadeup  { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
      .vhalo { animation: vbreathe 5s ease-in-out infinite; }
      .h2 { animation-delay: 1.66s } .h3 { animation-delay: 3.33s }
      .vrise { animation: vfadeup 0.9s cubic-bezier(0.2, 0.7, 0.3, 1) both; }
      .v1 { animation-delay: 0.1s } .v2 { animation-delay: 0.25s } .v3 { animation-delay: 0.4s }

      @media (prefers-reduced-motion: reduce) { * { animation: none !important } }
    </style>
  </defs>

  <!-- stage -->
  <rect width="1080" height="220" rx="28" fill="#020617"/>
  <rect x="24" y="24" width="1032" height="172" rx="20" fill="url(#vPanel)"/>
  <rect x="24" y="24" width="1032" height="172" rx="20" fill="url(#vDots)"/>
  <rect x="24" y="24" width="1032" height="172" rx="20" stroke="#1E293B" stroke-width="1.25" fill="none"/>

  <!-- card 1 · no account -->
  <g class="vrise v1">
    <g transform="translate(48 48)">
      <rect width="312" height="124" rx="16" fill="url(#vCard)" stroke="#26364E" stroke-width="1.25"/>
      <path d="M17 1.25 H295" stroke="#F8FAFC" stroke-opacity="0.06" stroke-width="1"/>
      <rect class="vhalo" x="20" y="20" width="40" height="40" rx="11" fill="#38BDF8"/>
      <rect x="20" y="20" width="40" height="40" rx="11" fill="#38BDF8" fill-opacity="0.1" stroke="#38BDF8" stroke-opacity="0.38"/>
      <g transform="translate(28 27)" class="vico" stroke="#7DD3FC">
        <circle cx="12" cy="8" r="4.5"/>
        <path d="M3.5 25 c0 -6 4 -9.5 8.5 -9.5 s8.5 3.5 8.5 9.5"/>
      </g>
      <text x="76" y="38" class="veye" fill="#BAE6FD">NO ACCOUNT</text>
      <text x="76" y="58" class="vbody">Nothing to sign up for, ever.</text>
      <text x="20" y="96" class="vbody" fill="#64748B">No email. No onboarding. Open the</text>
      <text x="20" y="113" class="vbody" fill="#64748B">app and drop files in.</text>
    </g>
  </g>

  <!-- card 2 · no upload -->
  <g class="vrise v2">
    <g transform="translate(384 48)">
      <rect width="312" height="124" rx="16" fill="url(#vCard)" stroke="#26364E" stroke-width="1.25"/>
      <path d="M17 1.25 H295" stroke="#F8FAFC" stroke-opacity="0.06" stroke-width="1"/>
      <rect class="vhalo h2" x="20" y="20" width="40" height="40" rx="11" fill="#2DD4BF"/>
      <rect x="20" y="20" width="40" height="40" rx="11" fill="#2DD4BF" fill-opacity="0.1" stroke="#2DD4BF" stroke-opacity="0.38"/>
      <g transform="translate(29 28)" class="vico" stroke="#5EEAD4">
        <rect x="0" y="10" width="22" height="15" rx="3"/>
        <path d="M4 10 v-3.5 a7 7 0 0 1 14 0 V10"/>
      </g>
      <text x="76" y="38" class="veye" fill="#CCFBF1">NO UPLOAD</text>
      <text x="76" y="58" class="vbody">Your files never leave your Mac.</text>
      <text x="20" y="96" class="vbody" fill="#64748B">Every merge, OCR pass, and export</text>
      <text x="20" y="113" class="vbody" fill="#64748B">runs on-device. Zero telemetry.</text>
    </g>
  </g>

  <!-- card 3 · no subscription -->
  <g class="vrise v3">
    <g transform="translate(720 48)">
      <rect width="312" height="124" rx="16" fill="url(#vCard)" stroke="#26364E" stroke-width="1.25"/>
      <path d="M17 1.25 H295" stroke="#F8FAFC" stroke-opacity="0.06" stroke-width="1"/>
      <rect class="vhalo h3" x="20" y="20" width="40" height="40" rx="11" fill="#A78BFA"/>
      <rect x="20" y="20" width="40" height="40" rx="11" fill="#A78BFA" fill-opacity="0.1" stroke="#A78BFA" stroke-opacity="0.38"/>
      <g transform="translate(40 40)" class="vico" stroke="#C4B5FD">
        <line x1="0" y1="-11" x2="0" y2="11"/>
        <path d="M-6 6 a6 4.5 0 0 0 12 0 a6 4.5 0 0 0 -12 -5 a6 4.5 0 0 0 12 -5"/>
        <line x1="-9" y1="9" x2="9" y2="-9" stroke-width="2"/>
      </g>
      <text x="76" y="38" class="veye" fill="#DDD6FE">NO SUBSCRIPTION</text>
      <text x="76" y="58" class="vbody">Free and open source. Apache 2.0.</text>
      <text x="20" y="96" class="vbody" fill="#64748B">$0 today, $0 forever. Read the code,</text>
      <text x="20" y="113" class="vbody" fill="#64748B">build it yourself, or just use it.</text>
    </g>
  </g>
</svg>
