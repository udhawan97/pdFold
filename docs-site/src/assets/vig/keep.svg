<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>A Mac window enclosing one paper sheet, with blocked outward arrows: nothing leaves</title>

  <!-- window outline -->
  <g fill="none" stroke="var(--edge)" stroke-width="1.5" stroke-linejoin="round">
    <rect x="176" y="120" width="288" height="200" rx="12" fill="var(--paper)"/>
    <line x1="176" y1="150" x2="464" y2="150"/>
    <circle cx="196" cy="135" r="4" fill="var(--paper-2)" stroke="none"/>
    <circle cx="210" cy="135" r="4" fill="var(--paper-2)" stroke="none"/>
    <circle cx="224" cy="135" r="4" fill="var(--paper-2)" stroke="none"/>
  </g>

  <!-- enclosed paper sheet, faceted with folded corner -->
  <g stroke="var(--edge)" stroke-width="1" stroke-linejoin="round">
    <polygon points="278,178 358,178 374,194 374,290 278,290" fill="var(--paper-3)"/>
    <polygon points="358,178 374,194 358,194" fill="var(--paper-2)"/>
    <g fill="var(--paper-2)" stroke="none">
      <rect x="296" y="212" width="60" height="5" rx="2.5"/>
      <rect x="296" y="228" width="70" height="5" rx="2.5"/>
      <rect x="296" y="244" width="52" height="5" rx="2.5"/>
    </g>
  </g>

  <!-- blocked outward arrows (dotted, crossed) -->
  <g fill="none" stroke="var(--edge)" stroke-width="1.5" stroke-dasharray="3 4" stroke-linecap="round">
    <!-- up -->
    <path d="M320,116 L320,74"/>
    <path d="M312,84 L320,74 L328,84"/>
    <!-- left -->
    <path d="M172,220 L112,220"/>
    <path d="M122,212 L112,220 L122,228"/>
    <!-- right -->
    <path d="M468,220 L528,220"/>
    <path d="M518,212 L528,220 L518,228"/>
  </g>

  <!-- red block crosses over each arrow -->
  <g stroke="var(--tancho)" stroke-width="2.5" stroke-linecap="round">
    <g>
      <line x1="310" y1="92" x2="330" y2="72"/>
      <line x1="310" y1="72" x2="330" y2="92"/>
    </g>
    <g>
      <line x1="128" y1="210" x2="148" y2="230"/>
      <line x1="128" y1="230" x2="148" y2="210"/>
    </g>
    <g>
      <line x1="492" y1="210" x2="512" y2="230"/>
      <line x1="492" y1="230" x2="512" y2="210"/>
    </g>
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.4s" fill="freeze"/>
  </g>
</svg>
