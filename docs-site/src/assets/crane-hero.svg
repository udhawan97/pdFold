<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="An origami crane folded from a single sheet of paper, one red crown its only color">
  <title>Orifold — an origami crane</title>
  <defs>
    <radialGradient id="ch-glow" cx="50%" cy="46%" r="52%">
      <stop offset="0" stop-color="var(--accent)" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="var(--accent)" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ch-lit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="var(--paper)"/>
    </linearGradient>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="200" cy="150" rx="180" ry="150" fill="url(#ch-glow)"/>

  <!-- the crane, folded from facets. Entrance: rise + settle once, then still. -->
  <g stroke="var(--edge)" stroke-width="1" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="translate" values="0 22; 0 0" keyTimes="0;1" dur="0.9s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    <animate attributeName="opacity" values="0;1" keyTimes="0;1" dur="0.6s" begin="0s" fill="freeze"/>

    <!-- far wing (back plane, in shadow) -->
    <polygon points="204,172 150,40 236,116" fill="var(--paper-2)"/>
    <!-- near wing (front plane, catching light) -->
    <polygon points="204,172 236,116 306,62 258,150" fill="url(#ch-lit)"/>
    <!-- wing crease highlight -->
    <polygon points="236,116 258,150 214,150" fill="var(--paper-3)"/>
    <!-- body -->
    <polygon points="204,172 258,150 242,214 192,208" fill="var(--paper)"/>
    <!-- body underside (shadow) -->
    <polygon points="192,208 242,214 214,236" fill="var(--paper-2)"/>
    <!-- neck (long, up to the head) -->
    <polygon points="204,172 122,150 92,120 128,158" fill="var(--paper-3)"/>
    <!-- head -->
    <polygon points="92,120 122,150 108,128" fill="var(--paper)"/>
    <!-- beak -->
    <polygon points="92,120 56,112 96,132" fill="var(--paper-2)"/>
    <!-- tail (long, to the right) -->
    <polygon points="258,150 380,138 300,192" fill="var(--paper)"/>
    <!-- tail fork (shadow) -->
    <polygon points="300,192 380,138 362,178" fill="var(--paper-2)"/>
    <!-- leg hint -->
    <polygon points="200,236 212,236 206,266" fill="var(--paper-2)"/>
  </g>

  <!-- the single red crown — pops once after the fold settles -->
  <circle cx="98" cy="116" r="0" fill="var(--tancho)" stroke="none">
    <animate attributeName="r" values="0;9;7" keyTimes="0;0.7;1" dur="0.42s" begin="0.9s" fill="freeze"/>
  </circle>
</svg>
