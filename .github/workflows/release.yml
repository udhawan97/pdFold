name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "release-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Prebuilt App
    runs-on: macos-15
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      PDFOLD_HAS_DEVELOPER_ID_CERTIFICATE: ${{ secrets.PDFOLD_DEVELOPER_ID_CERTIFICATE_BASE64 != '' && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Cache SwiftPM downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-downloads-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-downloads-

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Import Developer ID certificate
        if: ${{ env.PDFOLD_HAS_DEVELOPER_ID_CERTIFICATE == '1' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.PDFOLD_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.PDFOLD_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/pdfold-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          certificate_path="$RUNNER_TEMP/pdfold-developer-id.p12"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate_path" \
            -k "$keychain" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain"
          security list-keychains -d user -s "$keychain" $(security list-keychains -d user | sed 's/[ "]//g')
          security default-keychain -s "$keychain"
          security find-identity -v -p codesigning "$keychain"

      - name: Build distributable zip
        env:
          PDFOLD_SIGNING_IDENTITY: ${{ secrets.PDFOLD_SIGNING_IDENTITY || '-' }}
          PDFOLD_NOTARIZE: ${{ secrets.PDFOLD_SIGNING_IDENTITY != '' && secrets.PDFOLD_APPLE_ID != '' && secrets.PDFOLD_APPLE_TEAM_ID != '' && secrets.PDFOLD_APPLE_APP_SPECIFIC_PASSWORD != '' && '1' || '0' }}
          PDFOLD_APPLE_ID: ${{ secrets.PDFOLD_APPLE_ID }}
          PDFOLD_APPLE_TEAM_ID: ${{ secrets.PDFOLD_APPLE_TEAM_ID }}
          PDFOLD_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.PDFOLD_APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          zsh scripts/install-mac.sh \
            --clean \
            --no-open \
            --package-only \
            --package "$RUNNER_TEMP/pdFold.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdFold
          path: ${{ runner.temp }}/pdFold.zip
          if-no-files-found: error

      - name: Compute tagged release title
        if: startsWith(github.ref, 'refs/tags/')
        id: release-title
        run: |
          tag="${GITHUB_REF_NAME}"
          display_version="$tag"
          if [[ "$tag" == release-* ]]; then
            display_version="${tag#release-}"
          fi
          echo "title=${display_version} pdFold" >> "$GITHUB_OUTPUT"

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release-title.outputs.title }}
          files: ${{ runner.temp }}/pdFold.zip
          generate_release_notes: true
          make_latest: true
          overwrite_files: true

      - name: Publish rolling prebuilt release
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pdFold-latest
          name: pdFold Latest
          body: |
            Automatically built from `${{ github.sha }}`.

            This release exists so the one-line installer can install pdFold without requiring Xcode or Apple's Command Line Tools.
          files: ${{ runner.temp }}/pdFold.zip
          overwrite_files: true
          make_latest: false
