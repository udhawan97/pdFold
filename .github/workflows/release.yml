name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "release-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Prebuilt App
    runs-on: macos-15
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build distributable zip
        run: |
          zsh scripts/install-mac.sh \
            --clean \
            --no-open \
            --package-only \
            --package "$RUNNER_TEMP/pdFold.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdFold
          path: ${{ runner.temp }}/pdFold.zip
          if-no-files-found: error

      - name: Compute tagged release title
        if: startsWith(github.ref, 'refs/tags/')
        id: release-title
        run: |
          tag="${GITHUB_REF_NAME}"
          display_version="$tag"
          if [[ "$tag" == release-* ]]; then
            display_version="${tag#release-}"
          fi
          echo "title=${display_version} pdFold" >> "$GITHUB_OUTPUT"

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release-title.outputs.title }}
          files: ${{ runner.temp }}/pdFold.zip
          generate_release_notes: true
          make_latest: true
          overwrite_files: true

      - name: Publish rolling prebuilt release
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pdFold-latest
          name: pdFold Latest
          body: |
            Automatically built from `${{ github.sha }}`.

            This release exists so the one-line installer can install pdFold without requiring Xcode or Apple's Command Line Tools.
          files: ${{ runner.temp }}/pdFold.zip
          overwrite_files: true
          make_latest: false
