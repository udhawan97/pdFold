name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "release-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and publish as the latest release."
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Prebuilt App
    runs-on: macos-15
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      ORIFOLD_HAS_DEVELOPER_ID_CERTIFICATE: ${{ secrets.ORIFOLD_DEVELOPER_ID_CERTIFICATE_BASE64 != '' && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          persist-credentials: false

      - name: Cache SwiftPM downloads
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-downloads-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-downloads-

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Derive release version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* || -n "${{ inputs.release_tag }}" ]]; then
            ref="${{ inputs.release_tag || github.ref_name }}"
            v="${ref#release-}"
            v="${v#v}"
            echo "ORIFOLD_MARKETING_VERSION=$v" >> "$GITHUB_ENV"
            echo "ORIFOLD_BUILD_VERSION=${{ github.run_number }}" >> "$GITHUB_ENV"
            echo "marketing=$v" >> "$GITHUB_OUTPUT"
            echo "Release marketing version: $v (build ${{ github.run_number }})"
          else
            echo "Untagged build — the committed Info.plist version is used."
          fi

      - name: Import Developer ID certificate
        if: ${{ env.ORIFOLD_HAS_DEVELOPER_ID_CERTIFICATE == '1' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.ORIFOLD_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.ORIFOLD_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/orifold-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          certificate_path="$RUNNER_TEMP/orifold-developer-id.p12"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate_path" \
            -k "$keychain" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain"
          security list-keychains -d user -s "$keychain" $(security list-keychains -d user | sed 's/[ "]//g')
          security default-keychain -s "$keychain"
          security find-identity -v -p codesigning "$keychain"

      - name: Build distributable zip (universal)
        env:
          ORIFOLD_UNIVERSAL: "1"
          ORIFOLD_SIGNING_IDENTITY: ${{ secrets.ORIFOLD_SIGNING_IDENTITY || '-' }}
          ORIFOLD_NOTARIZE: ${{ secrets.ORIFOLD_SIGNING_IDENTITY != '' && secrets.ORIFOLD_APPLE_ID != '' && secrets.ORIFOLD_APPLE_TEAM_ID != '' && secrets.ORIFOLD_APPLE_APP_SPECIFIC_PASSWORD != '' && '1' || '0' }}
          ORIFOLD_APPLE_ID: ${{ secrets.ORIFOLD_APPLE_ID }}
          ORIFOLD_APPLE_TEAM_ID: ${{ secrets.ORIFOLD_APPLE_TEAM_ID }}
          ORIFOLD_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.ORIFOLD_APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          zsh scripts/install-mac.sh \
            --clean \
            --no-open \
            --package-only \
            --package "$RUNNER_TEMP/Orifold.zip"

      - name: Package DMG + checksums + manifest
        env:
          ORIFOLD_SIGNING_IDENTITY: ${{ secrets.ORIFOLD_SIGNING_IDENTITY || '-' }}
          ORIFOLD_NOTARIZE: ${{ secrets.ORIFOLD_SIGNING_IDENTITY != '' && secrets.ORIFOLD_APPLE_ID != '' && secrets.ORIFOLD_APPLE_TEAM_ID != '' && secrets.ORIFOLD_APPLE_APP_SPECIFIC_PASSWORD != '' && '1' || '0' }}
          ORIFOLD_APPLE_ID: ${{ secrets.ORIFOLD_APPLE_ID }}
          ORIFOLD_APPLE_TEAM_ID: ${{ secrets.ORIFOLD_APPLE_TEAM_ID }}
          ORIFOLD_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.ORIFOLD_APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          version="${ORIFOLD_MARKETING_VERSION:-}"
          if [[ -z "$version" ]]; then
            tmp="$(mktemp -d)"
            /usr/bin/ditto -x -k "$RUNNER_TEMP/Orifold.zip" "$tmp"
            app="$(/usr/bin/find "$tmp" -maxdepth 3 -name Orifold.app -type d -print -quit)"
            version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")"
          fi

          dist="$RUNNER_TEMP/dist"
          mkdir -p "$dist"
          dmg="$dist/Orifold-${version}-macOS-universal.dmg"

          zsh scripts/make-dmg.sh \
            --from-zip "$RUNNER_TEMP/Orifold.zip" \
            --output "$dmg" \
            --version "$version"

          # Stable-name alias so releases/latest/download/Orifold.dmg never breaks.
          cp "$dmg" "$dist/Orifold.dmg"
          cp "$RUNNER_TEMP/Orifold.zip" "$dist/Orifold.zip"
          ( cd "$dist" && shasum -a 256 Orifold.dmg > Orifold.dmg.sha256 )

          if [[ "${{ github.ref }}" == refs/tags/* || -n "${{ inputs.release_tag }}" ]]; then
            release_tag="${{ inputs.release_tag || github.ref_name }}"
          else
            release_tag="Orifold-latest"
          fi
          size="$(stat -f%z "$dmg")"
          sha="$(shasum -a 256 "$dmg" | awk '{print $1}')"
          base="https://github.com/${{ github.repository }}/releases/download/${release_tag}"
          cat > "$dist/manifest.json" <<MANIFEST
          {
            "version": "${version}",
            "build": "${{ github.run_number }}",
            "releaseDate": "$(date -u +%Y-%m-%d)",
            "minMacOS": "14",
            "arch": "universal2",
            "files": [
              {
                "name": "Orifold-${version}-macOS-universal.dmg",
                "size": ${size},
                "sha256": "${sha}",
                "url": "${base}/Orifold-${version}-macOS-universal.dmg"
              }
            ]
          }
          MANIFEST

          echo "Built assets:"
          ls -lh "$dist"

      - name: Smoke-test packaged app
        run: |
          set -euo pipefail
          dist="$RUNNER_TEMP/dist"
          smoke="$(mktemp -d)"

          # Verify the DMG we actually ship, not just the intermediate zip.
          mnt="$(mktemp -d)"
          /usr/bin/hdiutil attach "$dist/Orifold.dmg" -nobrowse -readonly -mountpoint "$mnt" >/dev/null
          app_src="$(/usr/bin/find "$mnt" -maxdepth 2 -name Orifold.app -type d -print -quit)"
          [[ -n "$app_src" ]] || { /usr/bin/hdiutil detach "$mnt" >/dev/null 2>&1 || true; echo "::error::Orifold.app not found in DMG"; exit 1; }
          /usr/bin/ditto "$app_src" "$smoke/Orifold.app"
          /usr/bin/hdiutil detach "$mnt" >/dev/null 2>&1 || true
          app="$smoke/Orifold.app"

          # Structural gate: this exact bundle is what a missing-resource build lacks.
          if [[ ! -d "$app/Contents/Resources/Orifold_Orifold.bundle" ]]; then
            echo "::error::Orifold_Orifold.bundle missing from packaged app — would crash at launch"
            exit 1
          fi
          if [[ ! -f "$app/Contents/Resources/Orifold_Orifold.bundle/Contents/Resources/Localizable.xcstrings" ]] \
             && [[ ! -f "$app/Contents/Resources/Orifold_Orifold.bundle/Localizable.xcstrings" ]]; then
            echo "::error::Localizable.xcstrings missing from resource bundle"
            exit 1
          fi
          codesign --verify --deep --strict "$app" || { echo "::error::codesign verify failed"; exit 1; }

          # Launch smoke: a fatalError at launch (the crash we are guarding) exits
          # within milliseconds. A healthy app keeps running until we stop it.
          "$app/Contents/MacOS/Orifold" >"$smoke/out.log" 2>&1 &
          pid=$!
          sleep 8
          if kill -0 "$pid" 2>/dev/null; then
            echo "App still alive after 8s — launch OK"
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          else
            wait "$pid" 2>/dev/null; code=$?
            echo "::error::App exited early (code $code) — launch crash"
            echo "----- launch output -----"
            cat "$smoke/out.log" || true
            exit 1
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Orifold
          path: |
            ${{ runner.temp }}/dist/Orifold-*-macOS-universal.dmg
            ${{ runner.temp }}/dist/Orifold.zip
          if-no-files-found: error

      - name: Compute tagged release title
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.release_tag != '' }}
        id: release-title
        run: |
          tag="${{ inputs.release_tag || github.ref_name }}"
          display_version="$tag"
          if [[ "$tag" == release-* ]]; then
            display_version="${tag#release-}"
          fi
          echo "title=${display_version} Orifold" >> "$GITHUB_OUTPUT"

      - name: Publish tagged GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          name: ${{ steps.release-title.outputs.title }}
          files: |
            ${{ runner.temp }}/dist/Orifold-*-macOS-universal.dmg
            ${{ runner.temp }}/dist/Orifold-*-macOS-universal.dmg.sha256
            ${{ runner.temp }}/dist/Orifold.dmg
            ${{ runner.temp }}/dist/Orifold.dmg.sha256
            ${{ runner.temp }}/dist/manifest.json
            ${{ runner.temp }}/dist/Orifold.zip
          generate_release_notes: true
          make_latest: true
          overwrite_files: true

      - name: Rebuild docs site
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.release_tag != '' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yml --ref main

      - name: Publish rolling prebuilt release
        if: ${{ !startsWith(github.ref, 'refs/tags/') && inputs.release_tag == '' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: Orifold-latest
          name: Orifold Latest
          prerelease: true
          body: |
            Development build from latest `main` — not the release channel.

            Automatically built from `${{ github.sha }}`. This build exists so the
            one-line installer can install Orifold without Xcode, and to keep the
            DMG pipeline exercised so release day stays boring.
          files: |
            ${{ runner.temp }}/dist/Orifold-*-macOS-universal.dmg
            ${{ runner.temp }}/dist/Orifold.dmg
            ${{ runner.temp }}/dist/Orifold.zip
          overwrite_files: true
          make_latest: false
