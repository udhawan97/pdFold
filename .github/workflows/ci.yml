name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Validate
    runs-on: macos-15
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v6
        with:
          path: |
            .build/checkouts
            .build/repositories
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-deps-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-deps-

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Validate property lists
        run: |
          plutil -lint Orifold/Resources/Info.plist
          plutil -lint Orifold/Resources/Orifold.entitlements
          plutil -lint "Install or Update Orifold.app/Contents/Info.plist"
          if grep -E "orifoldproj|UTExportedTypeDeclarations|Orifold Workspace" Orifold/Resources/Info.plist; then
            echo "Info.plist still advertises the retired workspace document type."
            exit 1
          fi

      - name: Check installer script syntax
        run: |
          zsh -n install.sh
          zsh -n scripts/install-mac.sh
          zsh -n scripts/install-mac.command
          zsh -n scripts/uninstall-mac.sh
          zsh -n "Install or Update Orifold.command"
          zsh -n "Uninstall Orifold.command"
          zsh -n "Install or Update Orifold.app/Contents/MacOS/OrifoldInstaller"

      - name: SwiftLint
        run: |
          command -v swiftlint || brew install swiftlint
          swiftlint lint --quiet

      - name: Swift Package build
        run: swift build

      - name: PDF smoke test
        run: swift test --filter PDFSmokeTests

      - name: Swift Package tests
        run: swift test

      - name: Xcode build
        run: |
          xcodebuild \
            -project Orifold.xcodeproj \
            -scheme Orifold \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/OrifoldDerivedData" \
            -resultBundlePath "$RUNNER_TEMP/Orifold.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Xcode tests
        run: |
          xcodebuild \
            -project Orifold.xcodeproj \
            -scheme Orifold \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/OrifoldDerivedData" \
            -resultBundlePath "$RUNNER_TEMP/OrifoldTests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload Xcode result bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: Orifold-xcresults
          path: |
            ${{ runner.temp }}/Orifold.xcresult
            ${{ runner.temp }}/OrifoldTests.xcresult
          if-no-files-found: ignore
