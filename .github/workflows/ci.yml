name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Validate
    runs-on: macos-15
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Validate property lists
        run: |
          plutil -lint PDFold/Resources/Info.plist
          plutil -lint PDFold/Resources/PDFold.entitlements

      - name: Check installer script syntax
        run: |
          zsh -n scripts/install-mac.sh
          zsh -n scripts/install-mac.command

      - name: Swift Package build
        run: swift build

      - name: Xcode build
        run: |
          xcodebuild \
            -project PDFold.xcodeproj \
            -scheme PDFold \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/PDFoldDerivedData" \
            -resultBundlePath "$RUNNER_TEMP/PDFold.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            build

      - name: Upload Xcode result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: PDFold-xcresult
          path: ${{ runner.temp }}/PDFold.xcresult
          if-no-files-found: ignore
