name: CodeQL

on:
  schedule:
    - cron: "31 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-15
    timeout-minutes: 75
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v6
        with:
          path: |
            .build/checkouts
            .build/repositories
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-deps-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-deps-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          queries: ${{ github.event_name == 'schedule' && 'security-extended,security-and-quality' || 'security-and-quality' }}

      - name: Build for analysis
        run: swift build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
