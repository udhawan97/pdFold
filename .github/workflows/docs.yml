name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
  schedule:
    # Daily re-bake so the download button's baked version/size self-heal within
    # 24h even if a post-release rebuild dispatch was missed.
    - cron: "17 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Install dependencies
        working-directory: docs-site
        run: npm ci
      - name: Build
        working-directory: docs-site
        env:
          # Authenticate the build-time releases/latest fetch so the download
          # button's version/size never fall back to LAST_KNOWN_GOOD on the
          # shared runner IP's unauthenticated rate limit.
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
