excluded:
  - .build
  - .claude/worktrees
  - Packages
  - docs-site

# This codebase predates SwiftLint adoption and has a large amount of existing
# code that trips the default "error" thresholds below (long files/functions,
# short identifiers in PDF/geometry code, etc). Rather than disable these
# rules outright, their error thresholds are relaxed to effectively
# warning-only so CI stays green on legacy code while still surfacing the
# signal in PR annotations for anything new or touched.
identifier_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 40
    error: 200
line_length:
  warning: 120
  error: 1000
type_body_length:
  warning: 250
  error: 10000
file_length:
  warning: 400
  error: 10000
function_body_length:
  warning: 50
  error: 1000
cyclomatic_complexity:
  warning: 10
  error: 1000
large_tuple:
  warning: 2
  error: 10
force_cast:
  severity: warning
force_try:
  severity: warning
