<svg width="1280" height="940" viewBox="0 0 1280 940" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PDFold Technical Architecture</title>
  <desc id="desc">Dark-mode technical architecture diagram showing the PDFold SwiftUI app surface, workspace state, PDFKit services, local persistence, exports, and release guardrails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070B14"/>
      <stop offset="0.58" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#071713"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" stroke="#1F3147" stroke-width="1" opacity="0.20"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .title { font: 800 32px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .subtitle { font: 550 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B6C3D4; }
      .layerTitle { font: 800 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .body { font: 550 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #A8B6C8; }
      .chip { font: 800 11.5px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .tag { font: 800 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 1.5px; }
      .layer { fill: #101827; stroke: #2B3F5C; stroke-width: 1.25; }
      .stateLayer { fill: #08251F; stroke: #0F766E; stroke-width: 1.25; }
      .engineLayer { fill: #111A34; stroke: #6366F1; stroke-width: 1.25; }
      .artifactLayer { fill: #1B1430; stroke: #A78BFA; stroke-width: 1.25; }
      .exportLayer { fill: #241609; stroke: #F59E0B; stroke-width: 1.25; }
      .rail { fill: #08251C; stroke: #22C55E; stroke-width: 1.25; }
    </style>
  </defs>

  <rect width="1280" height="940" rx="28" fill="#020617"/>
  <rect x="32" y="32" width="1216" height="876" rx="26" fill="url(#bg)"/>
  <rect x="32" y="32" width="1216" height="876" rx="26" fill="url(#grid)"/>
  <rect x="32" y="32" width="1216" height="876" rx="26" stroke="#1F3147"/>

  <text x="640" y="78" text-anchor="middle" class="title">PDFold Technical Architecture</text>
  <text x="640" y="108" text-anchor="middle" class="subtitle">SwiftUI document app, observable workspace state, PDFKit processing, local persistence, and export guardrails.</text>

  <g transform="translate(86 148)" filter="url(#shadow)">
    <rect width="820" height="104" rx="16" class="layer"/>
    <rect width="5" height="104" rx="2.5" fill="#38BDF8"/>
    <text x="30" y="34" class="tag" fill="#67E8F9">APP SHELL</text>
    <text x="30" y="62" class="body">DocumentGroup app entry, command wiring, and user-facing workspace window.</text>
    <g transform="translate(30 70)">
      <rect x="0" y="0" width="104" height="28" rx="14" fill="#082F49" stroke="#38BDF8"/>
      <text x="52" y="19" text-anchor="middle" class="chip" fill="#BAE6FD">PDFoldApp</text>
      <rect x="116" y="0" width="132" height="28" rx="14" fill="#082F49" stroke="#38BDF8"/>
      <text x="182" y="19" text-anchor="middle" class="chip" fill="#BAE6FD">DocumentGroup</text>
    </g>
  </g>

  <g transform="translate(86 282)" filter="url(#shadow)">
    <rect width="820" height="110" rx="16" class="layer"/>
    <rect width="5" height="110" rx="2.5" fill="#0EA5E9"/>
    <text x="30" y="34" class="tag" fill="#7DD3FC">SWIFTUI VIEWS</text>
    <text x="30" y="62" class="body">Sidebar, reader, inspector, search, toolbar, guide, and export actions.</text>
    <g transform="translate(30 74)">
      <rect x="0" y="0" width="104" height="28" rx="14" fill="#082F49" stroke="#0EA5E9"/>
      <text x="52" y="19" text-anchor="middle" class="chip" fill="#BAE6FD">ContentView</text>
      <rect x="116" y="0" width="120" height="28" rx="14" fill="#082F49" stroke="#0EA5E9"/>
      <text x="176" y="19" text-anchor="middle" class="chip" fill="#BAE6FD">ReadingCanvas</text>
      <rect x="248" y="0" width="112" height="28" rx="14" fill="#082F49" stroke="#0EA5E9"/>
      <text x="304" y="19" text-anchor="middle" class="chip" fill="#BAE6FD">InspectorView</text>
    </g>
  </g>

  <g transform="translate(86 422)" filter="url(#shadow)">
    <rect width="820" height="110" rx="16" class="stateLayer"/>
    <rect width="5" height="110" rx="2.5" fill="#2DD4BF"/>
    <text x="30" y="34" class="tag" fill="#5EEAD4">WORKSPACE STATE</text>
    <text x="30" y="62" class="body">Loaded PDFs, page order, metadata, annotations, search, undo, and export state.</text>
    <g transform="translate(30 74)">
      <rect x="0" y="0" width="158" height="28" rx="14" fill="#064E3B" stroke="#2DD4BF"/>
      <text x="79" y="19" text-anchor="middle" class="chip" fill="#CCFBF1">WorkspaceViewModel</text>
      <rect x="170" y="0" width="154" height="28" rx="14" fill="#064E3B" stroke="#2DD4BF"/>
      <text x="247" y="19" text-anchor="middle" class="chip" fill="#CCFBF1">WorkspaceDocument</text>
      <rect x="336" y="0" width="88" height="28" rx="14" fill="#064E3B" stroke="#2DD4BF"/>
      <text x="380" y="19" text-anchor="middle" class="chip" fill="#CCFBF1">PageRef</text>
    </g>
  </g>

  <g transform="translate(86 562)" filter="url(#shadow)">
    <rect width="820" height="126" rx="16" class="engineLayer"/>
    <rect width="5" height="126" rx="2.5" fill="#818CF8"/>
    <text x="30" y="34" class="tag" fill="#C4B5FD">PDFKIT WORKFLOW SERVICES</text>
    <text x="30" y="62" class="body">Import conversion, PDF composition, markup, page operations, password unlock, and artifact writers.</text>
    <g transform="translate(30 88)">
      <rect x="0" y="0" width="174" height="28" rx="14" fill="#312E81" stroke="#818CF8"/>
      <text x="87" y="19" text-anchor="middle" class="chip" fill="#E0E7FF">DocumentImportConverter</text>
      <rect x="186" y="0" width="112" height="28" rx="14" fill="#312E81" stroke="#818CF8"/>
      <text x="242" y="19" text-anchor="middle" class="chip" fill="#E0E7FF">PDFKitEngine</text>
      <rect x="310" y="0" width="116" height="28" rx="14" fill="#312E81" stroke="#818CF8"/>
      <text x="368" y="19" text-anchor="middle" class="chip" fill="#E0E7FF">PDFAnnotation</text>
      <rect x="438" y="0" width="92" height="28" rx="14" fill="#312E81" stroke="#818CF8"/>
      <text x="484" y="19" text-anchor="middle" class="chip" fill="#E0E7FF">PDFView</text>
    </g>
  </g>

  <g transform="translate(86 734)" filter="url(#shadow)">
    <rect width="390" height="76" rx="16" class="artifactLayer"/>
    <rect width="5" height="76" rx="2.5" fill="#A78BFA"/>
    <text x="30" y="31" class="tag" fill="#C4B5FD">LOCAL DOCUMENT STATE</text>
    <text x="30" y="54" class="body">Workspace metadata and member PDF data</text>
  </g>

  <g transform="translate(516 734)" filter="url(#shadow)">
    <rect width="390" height="76" rx="16" class="exportLayer"/>
    <rect width="5" height="76" rx="2.5" fill="#F59E0B"/>
    <text x="30" y="31" class="tag" fill="#FDBA74">EXPORT ARTIFACTS</text>
    <text x="30" y="54" class="body">PDF, DOCX, MD, TXT, HTML, PNG, and JPEG</text>
  </g>

  <g transform="translate(954 148)" filter="url(#shadow)">
    <rect width="240" height="662" rx="18" class="rail"/>
    <rect width="240" height="5" rx="2.5" fill="#22C55E"/>
    <text x="32" y="42" class="tag" fill="#86EFAC">RELEASE GUARDRAILS</text>
    <rect x="24" y="70" width="192" height="236" rx="14" fill="#0B1220" stroke="#166534"/>
    <g transform="translate(46 104)">
      <circle cx="6" cy="6" r="5" fill="#22C55E"/>
      <text x="22" y="10" class="body">Import size limits</text>
      <circle cx="6" cy="48" r="5" fill="#22C55E"/>
      <text x="22" y="52" class="body">Ink annotation repair</text>
      <circle cx="6" cy="90" r="5" fill="#22C55E"/>
      <text x="22" y="94" class="body">Serialization fallback</text>
      <circle cx="6" cy="132" r="5" fill="#22C55E"/>
      <text x="22" y="136" class="body">Bounded image export</text>
      <circle cx="6" cy="174" r="5" fill="#22C55E"/>
      <text x="22" y="178" class="body">Write-error reporting</text>
    </g>
    <rect x="24" y="330" width="192" height="118" rx="14" fill="#0B1220" stroke="#166534"/>
    <text x="46" y="372" class="tag" fill="#86EFAC">LOCAL INSTALLER</text>
    <text x="46" y="402" class="body">xcodebuild, signing,</text>
    <text x="46" y="426" class="body">Desktop launcher</text>
  </g>
</svg>
