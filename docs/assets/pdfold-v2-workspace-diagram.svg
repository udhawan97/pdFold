<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PDFold Product Flow</title>
  <desc id="desc">Dark-mode product flow diagram showing source files, the PDFold local workspace, and exported artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070B14"/>
      <stop offset="0.58" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#071713"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121B2B"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="workspace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D2A2A"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" stroke="#1F3147" stroke-width="1" opacity="0.22"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 800 32px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .subtitle { font: 550 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B6C3D4; }
      .step { font: 800 21px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .body { font: 550 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #A8B6C8; }
      .caption { font: 650 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9AA8BA; }
      .chip { font: 800 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tag { font: 800 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 1.6px; }
      .card { fill: url(#panel); stroke: #263A55; stroke-width: 1.25; }
      .workspaceCard { fill: url(#workspace); stroke: #2DD4BF; stroke-width: 1.35; }
      .arrow { stroke: #2DD4BF; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }
      .connector { fill: #062A2B; stroke: #2DD4BF; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="1280" height="720" rx="28" fill="#020617"/>
  <rect x="32" y="32" width="1216" height="656" rx="26" fill="url(#bg)"/>
  <rect x="32" y="32" width="1216" height="656" rx="26" fill="url(#grid)"/>
  <rect x="32" y="32" width="1216" height="656" rx="26" stroke="#1F3147"/>

  <text x="640" y="82" text-anchor="middle" class="title">PDFold Product Flow</text>
  <text x="640" y="112" text-anchor="middle" class="subtitle">Import files, assemble a local workspace, and export clean artifacts.</text>

  <g transform="translate(86 160)" filter="url(#shadow)">
    <rect width="318" height="360" rx="20" class="card"/>
    <rect width="318" height="5" rx="2.5" fill="#38BDF8"/>
    <text x="32" y="50" class="tag" fill="#67E8F9">01 IMPORT</text>
    <text x="32" y="86" class="step">Source files</text>
    <text x="32" y="124" class="body">Bring in user-selected PDFs,</text>
    <text x="32" y="146" class="body">Office documents, HTML files,</text>
    <text x="32" y="168" class="body">text, data, and images.</text>

    <g transform="translate(32 214)">
      <rect x="0" y="0" width="62" height="30" rx="15" fill="#082F49" stroke="#38BDF8"/>
      <text x="31" y="20" text-anchor="middle" class="chip" fill="#BAE6FD">PDF</text>
      <rect x="74" y="0" width="70" height="30" rx="15" fill="#082F49" stroke="#38BDF8"/>
      <text x="109" y="20" text-anchor="middle" class="chip" fill="#BAE6FD">DOCX</text>
      <rect x="156" y="0" width="70" height="30" rx="15" fill="#082F49" stroke="#38BDF8"/>
      <text x="191" y="20" text-anchor="middle" class="chip" fill="#BAE6FD">HTML</text>
      <rect x="238" y="0" width="48" height="30" rx="15" fill="#082F49" stroke="#38BDF8"/>
      <text x="262" y="20" text-anchor="middle" class="chip" fill="#BAE6FD">MD</text>

      <rect x="0" y="44" width="58" height="30" rx="15" fill="#082F49" stroke="#38BDF8"/>
      <text x="29" y="64" text-anchor="middle" class="chip" fill="#BAE6FD">TXT</text>
      <rect x="70" y="44" width="58" height="30" rx="15" fill="#082F49" stroke="#38BDF8"/>
      <text x="99" y="64" text-anchor="middle" class="chip" fill="#BAE6FD">CSV</text>
      <rect x="140" y="44" width="62" height="30" rx="15" fill="#082F49" stroke="#38BDF8"/>
      <text x="171" y="64" text-anchor="middle" class="chip" fill="#BAE6FD">JSON</text>
      <rect x="214" y="44" width="72" height="30" rx="15" fill="#082F49" stroke="#38BDF8"/>
      <text x="250" y="64" text-anchor="middle" class="chip" fill="#BAE6FD">Images</text>
    </g>
  </g>

  <g transform="translate(481 160)" filter="url(#shadow)">
    <rect width="318" height="360" rx="20" class="workspaceCard"/>
    <rect width="318" height="5" rx="2.5" fill="#2DD4BF"/>
    <text x="32" y="50" class="tag" fill="#5EEAD4">02 WORKSPACE</text>
    <text x="32" y="86" class="step">Organize and mark up</text>
    <text x="32" y="124" class="body">Review in the reader, reorder</text>
    <text x="32" y="146" class="body">pages, search, annotate, tag,</text>
    <text x="32" y="168" class="body">comment, and place signatures.</text>

    <g transform="translate(46 204)">
      <rect x="0" y="0" width="56" height="98" rx="12" fill="#0F172A" stroke="#274155"/>
      <rect x="13" y="17" width="30" height="18" rx="5" fill="#334155"/>
      <rect x="13" y="45" width="30" height="18" rx="5" fill="#334155"/>
      <rect x="13" y="74" width="30" height="8" rx="4" fill="#64748B"/>

      <rect x="84" y="-20" width="94" height="138" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
      <rect x="108" y="8" width="46" height="9" rx="4.5" fill="#94A3B8"/>
      <rect x="108" y="37" width="46" height="7" rx="3.5" fill="#CBD5E1"/>
      <rect x="108" y="62" width="46" height="8" rx="4" fill="#FACC15" opacity="0.78"/>
      <path d="M109 96 C124 86 139 109 155 96" stroke="#0F766E" stroke-width="4" stroke-linecap="round"/>

      <rect x="206" y="0" width="56" height="98" rx="12" fill="#0F172A" stroke="#274155"/>
      <circle cx="224" cy="26" r="5" fill="#2DD4BF"/>
      <rect x="236" y="22" width="15" height="7" rx="3.5" fill="#475569"/>
      <circle cx="224" cy="52" r="5" fill="#A78BFA"/>
      <rect x="236" y="48" width="15" height="7" rx="3.5" fill="#475569"/>
      <circle cx="224" cy="78" r="5" fill="#F59E0B"/>
      <rect x="236" y="74" width="15" height="7" rx="3.5" fill="#475569"/>
    </g>

    <g transform="translate(36 318)">
      <rect x="0" y="0" width="54" height="28" rx="14" fill="#064E3B" stroke="#2DD4BF"/>
      <text x="27" y="19" text-anchor="middle" class="chip" fill="#CCFBF1">Tags</text>
      <rect x="66" y="0" width="92" height="28" rx="14" fill="#064E3B" stroke="#2DD4BF"/>
      <text x="112" y="19" text-anchor="middle" class="chip" fill="#CCFBF1">Comments</text>
      <rect x="170" y="0" width="56" height="28" rx="14" fill="#064E3B" stroke="#2DD4BF"/>
      <text x="198" y="19" text-anchor="middle" class="chip" fill="#CCFBF1">Ink</text>
    </g>
  </g>

  <g transform="translate(876 160)" filter="url(#shadow)">
    <rect width="318" height="360" rx="20" class="card"/>
    <rect width="318" height="5" rx="2.5" fill="#A78BFA"/>
    <text x="32" y="50" class="tag" fill="#C4B5FD">03 OUTPUT</text>
    <text x="32" y="86" class="step">Export artifacts</text>
    <text x="32" y="124" class="body">Create clean Markdown, PDF,</text>
    <text x="32" y="146" class="body">Word, text, HTML, and image</text>
    <text x="32" y="168" class="body">outputs from the workspace.</text>

    <g transform="translate(32 214)">
      <rect x="0" y="0" width="58" height="30" rx="15" fill="#2E1065" stroke="#A78BFA"/>
      <text x="29" y="20" text-anchor="middle" class="chip" fill="#EDE9FE">PDF</text>
      <rect x="70" y="0" width="66" height="30" rx="15" fill="#2E1065" stroke="#A78BFA"/>
      <text x="103" y="20" text-anchor="middle" class="chip" fill="#EDE9FE">DOCX</text>
      <rect x="148" y="0" width="48" height="30" rx="15" fill="#2E1065" stroke="#A78BFA"/>
      <text x="172" y="20" text-anchor="middle" class="chip" fill="#EDE9FE">MD</text>
      <rect x="208" y="0" width="54" height="30" rx="15" fill="#2E1065" stroke="#A78BFA"/>
      <text x="235" y="20" text-anchor="middle" class="chip" fill="#EDE9FE">TXT</text>

      <rect x="0" y="44" width="64" height="30" rx="15" fill="#2E1065" stroke="#A78BFA"/>
      <text x="32" y="64" text-anchor="middle" class="chip" fill="#EDE9FE">HTML</text>
      <rect x="76" y="44" width="82" height="30" rx="15" fill="#2E1065" stroke="#A78BFA"/>
      <text x="117" y="64" text-anchor="middle" class="chip" fill="#EDE9FE">PNG/JPG</text>
      <rect x="170" y="44" width="78" height="30" rx="15" fill="#2E1065" stroke="#A78BFA"/>
      <text x="209" y="64" text-anchor="middle" class="chip" fill="#EDE9FE">Print</text>
    </g>
  </g>

  <g transform="translate(420 318)">
    <circle cx="22" cy="22" r="22" class="connector"/>
    <path d="M12 22 H29" class="arrow"/>
    <path d="M24 14 L32 22 L24 30" class="arrow"/>
  </g>

  <g transform="translate(820 318)">
    <circle cx="22" cy="22" r="22" class="connector"/>
    <path d="M12 22 H29" class="arrow"/>
    <path d="M24 14 L32 22 L24 30" class="arrow"/>
  </g>

  <g transform="translate(248 596)">
    <rect width="784" height="44" rx="22" fill="#08251C" stroke="#166534"/>
    <circle cx="28" cy="22" r="6" fill="#22C55E"/>
    <text x="48" y="27" class="caption">Local-first: documents, metadata, markup, and exports stay on your Mac.</text>
  </g>
</svg>
