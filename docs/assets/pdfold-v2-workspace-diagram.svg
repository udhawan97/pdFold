<svg width="1280" height="680" viewBox="0 0 1280 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PDFold Product Flow</title>
  <desc id="desc">A clean product flow diagram showing PDFold importing source files, assembling a local workspace, and saving or exporting artifacts.</desc>
  <defs>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 750 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .subtitle { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .step { font: 750 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .body { font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .small { font: 600 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; }
      .chip { font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tag { font: 700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 1.4px; }
      .card { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.25; }
      .arrow { stroke: #0F766E; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1280" height="680" rx="24" fill="#F8FAFC"/>
  <rect x="32" y="32" width="1216" height="616" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="640" y="82" text-anchor="middle" class="title">PDFold Product Flow</text>
  <text x="640" y="112" text-anchor="middle" class="subtitle">Import files, assemble a local workspace, and export clean artifacts.</text>

  <g filter="url(#softShadow)">
    <rect x="88" y="172" width="318" height="326" rx="18" class="card"/>
    <rect x="88" y="172" width="318" height="5" rx="2.5" fill="#2563EB"/>
    <text x="120" y="218" class="tag" fill="#2563EB">01 IMPORT</text>
    <text x="120" y="252" class="step">Import source files</text>
    <text x="120" y="284" class="body">Bring in user-selected PDFs, Office</text>
    <text x="120" y="305" class="body">documents, HTML files, text, data,</text>
    <text x="120" y="326" class="body">and images.</text>

    <g transform="translate(120 370)">
      <rect x="0" y="0" width="62" height="30" rx="15" fill="#DBEAFE"/>
      <text x="31" y="20" text-anchor="middle" class="chip" fill="#1D4ED8">PDF</text>
      <rect x="72" y="0" width="70" height="30" rx="15" fill="#DBEAFE"/>
      <text x="107" y="20" text-anchor="middle" class="chip" fill="#1D4ED8">DOCX</text>
      <rect x="152" y="0" width="70" height="30" rx="15" fill="#DBEAFE"/>
      <text x="187" y="20" text-anchor="middle" class="chip" fill="#1D4ED8">HTML</text>
      <rect x="232" y="0" width="54" height="30" rx="15" fill="#DBEAFE"/>
      <text x="259" y="20" text-anchor="middle" class="chip" fill="#1D4ED8">MD</text>

      <rect x="0" y="42" width="58" height="30" rx="15" fill="#DBEAFE"/>
      <text x="29" y="62" text-anchor="middle" class="chip" fill="#1D4ED8">TXT</text>
      <rect x="68" y="42" width="58" height="30" rx="15" fill="#DBEAFE"/>
      <text x="97" y="62" text-anchor="middle" class="chip" fill="#1D4ED8">CSV</text>
      <rect x="136" y="42" width="62" height="30" rx="15" fill="#DBEAFE"/>
      <text x="167" y="62" text-anchor="middle" class="chip" fill="#1D4ED8">JSON</text>
      <rect x="208" y="42" width="78" height="30" rx="15" fill="#DBEAFE"/>
      <text x="247" y="62" text-anchor="middle" class="chip" fill="#1D4ED8">Images</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="481" y="148" width="318" height="374" rx="18" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1.25"/>
    <rect x="481" y="148" width="318" height="5" rx="2.5" fill="#0F766E"/>
    <text x="513" y="194" class="tag" fill="#0F766E">02 WORKSPACE</text>
    <text x="513" y="228" class="step">Organize and mark up</text>
    <text x="513" y="260" class="body">Reorder documents and pages,</text>
    <text x="513" y="281" class="body">review in the reader, search,</text>
    <text x="513" y="302" class="body">annotate, tag, comment, and sign.</text>

    <g transform="translate(536 348)">
      <rect x="0" y="0" width="58" height="98" rx="12" fill="#FFFFFF" stroke="#CCFBF1"/>
      <rect x="13" y="17" width="32" height="18" rx="5" fill="#CBD5E1"/>
      <rect x="13" y="45" width="32" height="18" rx="5" fill="#CBD5E1"/>
      <rect x="13" y="74" width="32" height="8" rx="4" fill="#94A3B8"/>

      <rect x="82" y="-20" width="94" height="138" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
      <rect x="106" y="8" width="46" height="9" rx="4.5" fill="#94A3B8"/>
      <rect x="106" y="37" width="46" height="7" rx="3.5" fill="#CBD5E1"/>
      <rect x="106" y="62" width="46" height="8" rx="4" fill="#FACC15" opacity="0.72"/>
      <path d="M107 96 C122 86 137 109 153 96" stroke="#0F766E" stroke-width="4" stroke-linecap="round"/>

      <rect x="200" y="0" width="58" height="98" rx="12" fill="#FFFFFF" stroke="#CCFBF1"/>
      <circle cx="218" cy="26" r="5" fill="#0F766E"/>
      <rect x="230" y="22" width="16" height="7" rx="3.5" fill="#CBD5E1"/>
      <circle cx="218" cy="52" r="5" fill="#7C3AED"/>
      <rect x="230" y="48" width="16" height="7" rx="3.5" fill="#CBD5E1"/>
      <circle cx="218" cy="78" r="5" fill="#F59E0B"/>
      <rect x="230" y="74" width="16" height="7" rx="3.5" fill="#CBD5E1"/>
    </g>

    <g transform="translate(513 476)">
      <rect x="0" y="0" width="54" height="28" rx="14" fill="#CCFBF1"/>
      <text x="27" y="19" text-anchor="middle" class="chip" fill="#0F766E">Tags</text>
      <rect x="64" y="0" width="90" height="28" rx="14" fill="#CCFBF1"/>
      <text x="109" y="19" text-anchor="middle" class="chip" fill="#0F766E">Comments</text>
      <rect x="164" y="0" width="56" height="28" rx="14" fill="#CCFBF1"/>
      <text x="192" y="19" text-anchor="middle" class="chip" fill="#0F766E">Ink</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="874" y="172" width="318" height="326" rx="18" class="card"/>
    <rect x="874" y="172" width="318" height="5" rx="2.5" fill="#7C3AED"/>
    <text x="906" y="218" class="tag" fill="#7C3AED">03 OUTPUT</text>
    <text x="906" y="252" class="step">Save or export</text>
    <text x="906" y="284" class="body">Keep editing in a project package</text>
    <text x="906" y="305" class="body">or create Markdown, PDF, HTML,</text>
    <text x="906" y="326" class="body">and image exports.</text>

    <g transform="translate(906 370)">
      <rect x="0" y="0" width="110" height="30" rx="15" fill="#EDE9FE"/>
      <text x="55" y="20" text-anchor="middle" class="chip" fill="#6D28D9">.pdfoldproj</text>
      <rect x="120" y="0" width="58" height="30" rx="15" fill="#EDE9FE"/>
      <text x="149" y="20" text-anchor="middle" class="chip" fill="#6D28D9">PDF</text>
      <rect x="188" y="0" width="66" height="30" rx="15" fill="#EDE9FE"/>
      <text x="221" y="20" text-anchor="middle" class="chip" fill="#6D28D9">DOCX</text>

      <rect x="0" y="42" width="48" height="30" rx="15" fill="#EDE9FE"/>
      <text x="24" y="62" text-anchor="middle" class="chip" fill="#6D28D9">MD</text>
      <rect x="58" y="42" width="54" height="30" rx="15" fill="#EDE9FE"/>
      <text x="85" y="62" text-anchor="middle" class="chip" fill="#6D28D9">TXT</text>
      <rect x="122" y="42" width="64" height="30" rx="15" fill="#EDE9FE"/>
      <text x="154" y="62" text-anchor="middle" class="chip" fill="#6D28D9">HTML</text>
      <rect x="196" y="42" width="82" height="30" rx="15" fill="#EDE9FE"/>
      <text x="237" y="62" text-anchor="middle" class="chip" fill="#6D28D9">PNG/JPG</text>
    </g>
  </g>

  <path d="M421 335 H457" class="arrow"/>
  <path d="M445 324 L458 335 L445 346" class="arrow"/>
  <path d="M823 335 H859" class="arrow"/>
  <path d="M847 324 L860 335 L847 346" class="arrow"/>

  <g transform="translate(248 580)">
    <rect width="784" height="44" rx="22" fill="#F0FDF4" stroke="#BBF7D0"/>
    <circle cx="28" cy="22" r="6" fill="#16A34A"/>
    <text x="48" y="27" class="small">Local-first: documents, metadata, markup, and exports stay on your Mac.</text>
  </g>
</svg>
