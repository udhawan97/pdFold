<svg id="of-hero-crane" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orifold — a sheet of paper folds into an origami crane crossing a red sun">
<title>Orifold — a sheet of paper folds into an origami crane crossing a red sun</title>
<desc>The Orifold brand mark: an ivory origami crane in flight across a red sun on a deep indigo tile. Plays a one-shot fold-in and settles on the finished app icon.</desc>
<defs>
<clipPath id="h-clip"><rect x="6" y="6" width="1012" height="1012" rx="226"/></clipPath>
<clipPath id="h-crane">
<path d="M932 284 L840 310 L630 512 L540 668 L388 560 L196 282 L216 254 L420 452 L428 132 L498 328 L586 164 L632 448 L846 232 Z"/>
</clipPath>
<linearGradient id="h-tile" x1="0" y1="1" x2="1" y2="0">
<stop offset="0" stop-color="#192c48"/><stop offset="0.52" stop-color="#2a4a6e"/><stop offset="1" stop-color="#5da9c2"/>
</linearGradient>
<radialGradient id="h-sun" cx="0.4" cy="0.34" r="0.8">
<stop offset="0" stop-color="#ea4b3c"/><stop offset="0.62" stop-color="#df3f38"/><stop offset="1" stop-color="#cb322e"/>
</radialGradient>
<radialGradient id="h-glow" cx="0.5" cy="0.5" r="0.5">
<stop offset="0.76" stop-color="#e63d38" stop-opacity="0"/><stop offset="0.86" stop-color="#e63d38" stop-opacity="0.16"/><stop offset="1" stop-color="#e63d38" stop-opacity="0"/>
</radialGradient>
<linearGradient id="h-paper" x1="0" y1="0" x2="0.55" y2="1">
<stop offset="0" stop-color="#fffdf9"/><stop offset="1" stop-color="#f1ecdf"/>
</linearGradient>
<radialGradient id="h-seat" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#0d1626" stop-opacity="0.16"/><stop offset="1" stop-color="#0d1626" stop-opacity="0"/>
</radialGradient>
<linearGradient id="h-sweep" x1="0" y1="0" x2="1" y2="0.4">
<stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>
</defs>
<g clip-path="url(#h-clip)">
<!-- Tile: base = final; fades in once. -->
<g>
<animate attributeName="opacity" values="0;1" dur="0.24s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
<rect x="6" y="6" width="1012" height="1012" fill="url(#h-tile)"/>
<rect x="46" y="46" width="932" height="932" rx="190" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="3"/>
</g>
<!-- Sun: seal-stamp scale-in about its centre. -->
<g transform="translate(672 330)">
<g>
<animateTransform attributeName="transform" type="scale" values="0.2;1.05;1" keyTimes="0;0.75;1" dur="0.34s" begin="0.16s" fill="freeze" calcMode="spline" keySplines="0.34 1.2 0.5 1;0.4 0 0.4 1"/>
<animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.16s" fill="freeze"/>
<g transform="translate(-672 -330)">
<circle cx="672" cy="330" r="286" fill="url(#h-glow)"/>
<circle cx="672" cy="330" r="252" fill="url(#h-sun)"/>
<circle cx="672" cy="330" r="250" fill="none" stroke="#9c1f22" stroke-opacity="0.28" stroke-width="4"/>
</g>
</g>
</g>
<!-- Crane: unfolds upward from its base, settling with a soft overshoot. -->
<g transform="translate(520 668)">
<g>
<animateTransform attributeName="transform" type="scale" values="1 0.06;1 1.05;1 1" keyTimes="0;0.82;1" dur="0.5s" begin="0.32s" fill="freeze" calcMode="spline" keySplines="0.22 0.7 0.25 1;0.4 0 0.3 1"/>
<animate attributeName="opacity" values="0;1" dur="0.2s" begin="0.32s" fill="freeze"/>
<g transform="translate(-520 -668)">
<ellipse cx="530" cy="640" rx="200" ry="85" fill="url(#h-seat)"/>
<path fill="url(#h-paper)" d="M932 284 L840 310 L630 512 L540 668 L388 560 L196 282 L216 254 L420 452 L428 132 L498 328 L586 164 L632 448 L846 232 Z"/>
<path fill="#e6e2d7" d="M498 328 L586 164 L632 448 Z"/>
<path fill="#ece8dd" d="M428 132 L498 328 L464 448 L420 452 Z"/>
<path fill="#dcd6c9" d="M630 512 L540 668 L400 556 Z"/>
<path fill="#e2ddd1" d="M388 560 L196 282 L372 505 Z"/>
<path fill="#efe9db" d="M632 508 L800 348 L668 462 Z"/>
<path fill="#e9e4d8" d="M840 310 L932 284 L858 292 Z"/>
<path fill="#ffffff" fill-opacity="0.35" d="M422 136 L430 134 L500 326 L492 328 Z"/>
<path fill="#ffffff" fill-opacity="0.3" d="M634 446 L844 234 L848 240 L638 452 Z"/>
</g>
</g>
</g>
<!-- Highlight sweep across the folded paper — one pass, returns to nothing. -->
<g clip-path="url(#h-crane)">
<g opacity="0">
<animate attributeName="opacity" values="0;0.5;0" keyTimes="0;0.5;1" dur="0.36s" begin="0.82s" fill="freeze"/>
<g transform="translate(-560 0)">
<animateTransform attributeName="transform" type="translate" values="-560 0;620 0" dur="0.36s" begin="0.82s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
<rect x="0" y="0" width="230" height="1024" fill="url(#h-sweep)" transform="skewX(-18)"/>
</g>
</g>
</g>
</g>
</svg>
