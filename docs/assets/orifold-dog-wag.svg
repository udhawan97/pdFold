<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="220" height="220" role="img" aria-label="Gami the origami Bernedoodle: a seated paper dog with floppy black ears and a cream blaze, tail wagging">
  <title>Orifold — Gami the origami Bernedoodle, tail wagging</title>
  <defs>
    <linearGradient id="dogTileG" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#2b4566"/><stop offset="1" stop-color="#75bfd4"/></linearGradient>
    <radialGradient id="dogMoonG" cx="0.71" cy="0.30" r="0.20"><stop offset="0" stop-color="rgba(219,242,247,0.26)"/><stop offset="1" stop-color="rgba(179,230,242,0)"/></radialGradient>
    <radialGradient id="dogTileGlow" cx="0.82" cy="0.2" r="0.75"><stop offset="0" stop-color="rgba(128,209,219,0.22)"/><stop offset="1" stop-color="rgba(128,209,219,0)"/></radialGradient>
    <radialGradient id="dogContactG"><stop offset="0" stop-color="rgba(0,0,0,0.20)"/><stop offset="1" stop-color="rgba(0,0,0,0)"/></radialGradient>
    <filter id="dogSoft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.22"/></filter>

    <!-- Bernedoodle paper tones: warm near-black ears/saddle/tail, cream blaze/chest/muzzle, matching the in-app palette. -->
    <linearGradient id="dogHeadLit" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#413830"/><stop offset="1" stop-color="#221c18"/></linearGradient>
    <linearGradient id="dogHeadShade" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#241e19"/><stop offset="1" stop-color="#120f0c"/></linearGradient>
    <linearGradient id="dogEarLit" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3a322b"/><stop offset="1" stop-color="#1c1713"/></linearGradient>
    <linearGradient id="dogEarShade" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c1713"/><stop offset="1" stop-color="#0d0b09"/></linearGradient>
    <linearGradient id="dogBodyLit" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#413830"/><stop offset="1" stop-color="#221c18"/></linearGradient>
    <linearGradient id="dogBodyShade" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#241e19"/><stop offset="1" stop-color="#100d0a"/></linearGradient>
    <linearGradient id="dogTailLit" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#413830"/><stop offset="1" stop-color="#2a231d"/></linearGradient>
    <linearGradient id="dogTailShade" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#241e19"/><stop offset="1" stop-color="#100d0a"/></linearGradient>
    <linearGradient id="dogCreamLit" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fffaf0"/><stop offset="1" stop-color="#ecdfc4"/></linearGradient>
    <linearGradient id="dogCreamShade" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e8dcc2"/><stop offset="1" stop-color="#cabb9a"/></linearGradient>
  </defs>

  <clipPath id="dogTileClip"><rect width="340" height="340" rx="75"/></clipPath>
  <g clip-path="url(#dogTileClip)">
    <rect width="340" height="340" fill="url(#dogTileG)"/>
    <rect width="340" height="340" fill="url(#dogMoonG)"/>
    <rect width="340" height="340" fill="url(#dogTileGlow)"/>
    <rect x="19" y="19" width="303" height="303" rx="56" fill="none" stroke="rgba(255,255,255,0.06)"/>
    <rect x="37" y="37" width="265" height="265" rx="37" fill="none" stroke="rgba(255,255,255,0.06)"/>

    <ellipse cx="150" cy="278" rx="72" ry="13" fill="url(#dogContactG)"/>

    <g filter="url(#dogSoft)">
      <!-- Far (near-camera) ear — a large floppy trapezoid draping behind the head. -->
      <polygon points="150,96 112,64 122,150 158,140" fill="url(#dogEarShade)"/>
      <!-- Tail — wagging group, pivoting at its base near the haunch; cream-tipped. -->
      <g transform="rotate(0 128 236)">
        <animateTransform attributeName="transform" type="rotate" values="-12 128 236;12 128 236;-12 128 236" keyTimes="0;0.5;1" dur="1.3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <polygon points="128,236 68,188 140,218" fill="url(#dogTailLit)"/>
        <polygon points="128,236 140,218 150,236" fill="url(#dogTailShade)"/>
        <polygon points="68,188 88,198 80,213" fill="url(#dogCreamLit)"/>
      </g>
      <!-- Body / seated haunch (black saddle) -->
      <polygon points="160,180 160,270 100,240" fill="url(#dogBodyShade)"/>
      <polygon points="160,180 200,260 160,270" fill="url(#dogBodyLit)"/>
      <!-- Chest tuft — the cream blaze continuing down the front. -->
      <polygon points="168,187 188,230 163,255" fill="url(#dogCreamLit)"/>
      <polygon points="168,258 205,256 200,272 168,272" fill="url(#dogCreamLit)"/>
      <!-- Head (black, split shade/lit) -->
      <polygon points="170,110 170,195 135,150" fill="url(#dogHeadShade)"/>
      <polygon points="170,110 205,150 170,195" fill="url(#dogHeadLit)"/>
      <!-- Blaze — the cream stripe down the center of the face into the muzzle. -->
      <polygon points="163,120 182,132 176,178 158,163" fill="url(#dogCreamLit)"/>
      <!-- Eye, set on the blaze -->
      <polygon points="176,140 194,146 177,158" fill="#2e241d"/>
      <polygon points="179,142 185,144 180,148" fill="#ffffff" opacity="0.85"/>
      <!-- Muzzle — short and rounded, cream -->
      <polygon points="196,128 240,158 198,158" fill="url(#dogCreamLit)"/>
      <polygon points="198,158 240,158 206,178" fill="url(#dogCreamShade)"/>
      <!-- Nose -->
      <polygon points="233,152 249,158 234,168" fill="#3a2a22"/>
      <polygon points="236,154 243,156 238,160" fill="#ffffff" opacity="0.5"/>
      <!-- Near ear — the larger floppy trapezoid draping over the cheek on the left. -->
      <polygon points="150,96 116,72 128,146 155,136" fill="url(#dogEarLit)"/>
      <polygon points="150,100 128,90 134,138 152,132" fill="url(#dogEarShade)" opacity="0.7"/>
    </g>
  </g>
</svg>
