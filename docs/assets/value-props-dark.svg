    </g>
    <text x="0" y="86" font-size="17" font-weight="700" fill="#e6edf3">No subscription</text>
    <text x="0" y="109" font-size="12.5" fill="#8b949e">Free and open</text>
    <text x="0" y="126" font-size="12.5" fill="#8b949e">source, MIT licensed</text>
