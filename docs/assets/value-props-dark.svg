<svg viewBox="0 0 1000 190" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="No account: nothing to sign up for, ever. No upload: your files never leave your Mac. No subscription: free and open source, MIT licensed.">
  <defs>
    <linearGradient id="vpGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <g transform="translate(166,0)" text-anchor="middle">
    <circle cx="0" cy="34" r="30" fill="url(#vpGrad)" fill-opacity="0.14"/>
    <g transform="translate(-14,20)" stroke="#60A5FA" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="14" cy="7" r="6.5"/>
