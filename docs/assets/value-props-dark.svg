    </g>
    <text x="0" y="86" font-size="17" font-weight="700" fill="#e6edf3">No account</text>
    <text x="0" y="109" font-size="12.5" fill="#8b949e">Nothing to sign up</text>
    <text x="0" y="126" font-size="12.5" fill="#8b949e">for, ever</text>
  </g>

  <line x1="333" y1="20" x2="333" y2="150" stroke="#30363d"/>

  <g transform="translate(500,0)" text-anchor="middle">
    <circle cx="0" cy="34" r="30" fill="url(#vpGrad)" fill-opacity="0.14"/>
    <g transform="translate(-11,17)" stroke="#34D399" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="12" width="22" height="17" rx="3"/>
      <path d="M4 12 v-4 a7 7 0 0 1 14 0 v4"/>
    </g>
    <text x="0" y="86" font-size="17" font-weight="700" fill="#e6edf3">No upload</text>
    <text x="0" y="109" font-size="12.5" fill="#8b949e">Your files never</text>
    <text x="0" y="126" font-size="12.5" fill="#8b949e">leave your Mac</text>
  </g>

  <line x1="667" y1="20" x2="667" y2="150" stroke="#30363d"/>

  <g transform="translate(834,0)" text-anchor="middle">
    <circle cx="0" cy="34" r="30" fill="url(#vpGrad)" fill-opacity="0.14"/>
