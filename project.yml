name: Orifold
options:
  bundleIdPrefix: com.ud
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.ud.Orifold
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    ENABLE_HARDENED_RUNTIME: YES

packages:
  PDFiumBinary:
    path: Packages/PDFiumBinary
  QPDFBinary:
    path: Packages/QPDFBinary
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    from: 3.0.0
  swift-asn1:
    url: https://github.com/apple/swift-asn1.git
    from: 1.0.0
  swift-certificates:
    url: https://github.com/apple/swift-certificates.git
    from: 1.0.0

targets:
  Orifold:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Orifold
        excludes:
          - Resources/Info.plist
    resources:
      - path: Orifold/Resources/Assets.xcassets
      - path: Orifold/Resources/CERTIFICATE_GUIDE.md
      - path: Orifold/Resources/THIRD-PARTY-NOTICES.md
      - path: Orifold/Resources/Localizable.xcstrings
    dependencies:
      - package: PDFiumBinary
        product: PDFium
      - package: QPDFBinary
        product: CQPDF
      - package: swift-crypto
        product: Crypto
      - package: swift-asn1
        product: SwiftASN1
      - package: swift-certificates
        product: X509
    info:
      path: Orifold/Resources/Info.plist
      properties:
        CFBundleDisplayName: Orifold
        CFBundleShortVersionString: "0.8.10"
        CFBundleVersion: "17"
        NSHumanReadableCopyright: "Copyright © 2026. Apache License 2.0."
        NSPrincipalClass: NSApplication
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        NSAppTransportSecurity:
          NSExceptionDomains:
            timestamp.digicert.com:
              NSExceptionAllowsInsecureHTTPLoads: true
            timestamp.globalsign.com:
              NSExceptionAllowsInsecureHTTPLoads: true
        CFBundleDocumentTypes:
          - CFBundleTypeExtensions: [pdf]
            CFBundleTypeName: PDF Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes: [com.adobe.pdf, public.pdf]
          - CFBundleTypeExtensions: [html, htm]
            CFBundleTypeName: HTML Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [public.html]
          - CFBundleTypeExtensions: [docx, doc]
            CFBundleTypeName: Word Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.openxmlformats.wordprocessingml.document, com.microsoft.word.doc]
          - CFBundleTypeExtensions: [odt, rtfd]
            CFBundleTypeName: OpenDocument Text and RTFD
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.oasis-open.opendocument.text, com.apple.rtfd]
          - CFBundleTypeExtensions: [xlsx, pptx, epub]
            CFBundleTypeName: Structured Package Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.openxmlformats.spreadsheetml.sheet, org.openxmlformats.presentationml.presentation, org.idpf.epub-container]
          - CFBundleTypeExtensions: [svg]
            CFBundleTypeName: SVG Image
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [public.svg-image]
          - CFBundleTypeExtensions: [txt, text, log, rtf, md, markdown, csv, tsv, json, jsonl, xml, yaml, yml, toml, plist, swift, js, ts, tsx, jsx, py, rb, go, rs, java, kt, c, cc, cpp, h, hpp, m, mm, cs, php, sh, zsh, bash, sql, ini, conf, env]
            CFBundleTypeName: Text Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes: [public.text, public.plain-text, public.utf8-plain-text, public.rtf, net.daringfireball.markdown, public.comma-separated-values-text, public.tab-separated-values-text, public.json, public.xml, com.apple.property-list]
          - CFBundleTypeExtensions: [png, jpg, jpeg, gif, tif, tiff, heic, bmp, webp]
            CFBundleTypeName: Image
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes: [public.image, public.png, public.jpeg, com.compuserve.gif, public.tiff, public.heic, com.microsoft.bmp, org.webmproject.webp]
    entitlements:
      path: Orifold/Resources/Orifold.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_NAME: Orifold
        PRODUCT_MODULE_NAME: Orifold
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: Orifold/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Orifold/Resources/Orifold.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_PREVIEWS: YES
        OTHER_LDFLAGS: ["-lc++", "-lz"]

  OrifoldTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/OrifoldTests
    dependencies:
      - package: PDFiumBinary
        product: PDFium
      - package: QPDFBinary
        product: CQPDF
      - target: Orifold
    settings:
      base:
        PRODUCT_NAME: OrifoldTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: "$(BUILT_PRODUCTS_DIR)/Orifold.app/Contents/MacOS/Orifold.debug.dylib"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks $(BUILT_PRODUCTS_DIR)/Orifold.app/Contents/MacOS"

schemes:
  Orifold:
    build:
      targets:
        Orifold: all
    test:
      targets:
        - OrifoldTests
