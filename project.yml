name: PDFold
options:
  bundleIdPrefix: com.ud
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.ud.PDFold
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    ENABLE_HARDENED_RUNTIME: YES

packages:
  PDFiumBinary:
    path: Packages/PDFiumBinary
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    from: 3.0.0
  swift-asn1:
    url: https://github.com/apple/swift-asn1.git
    from: 1.0.0
  swift-certificates:
    url: https://github.com/apple/swift-certificates.git
    from: 1.0.0

targets:
  PDFold:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PDFold
        excludes:
          - Resources/Info.plist
    resources:
      - path: PDFold/Resources/Assets.xcassets
      - path: PDFold/Resources/CERTIFICATE_GUIDE.md
    dependencies:
      - package: PDFiumBinary
        product: PDFium
      - package: swift-crypto
        product: Crypto
      - package: swift-asn1
        product: SwiftASN1
      - package: swift-certificates
        product: X509
    info:
      path: PDFold/Resources/Info.plist
      properties:
        CFBundleDisplayName: pdFold
        CFBundleShortVersionString: "3.0"
        CFBundleVersion: "6"
        NSHumanReadableCopyright: "Copyright © 2026. MIT License."
        NSPrincipalClass: NSApplication
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        CFBundleDocumentTypes:
          - CFBundleTypeExtensions: [pdf]
            CFBundleTypeName: PDF Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes: [com.adobe.pdf, public.pdf]
          - CFBundleTypeExtensions: [html, htm]
            CFBundleTypeName: HTML Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes: [public.html]
          - CFBundleTypeExtensions: [docx, doc]
            CFBundleTypeName: Word Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.openxmlformats.wordprocessingml.document, com.microsoft.word.doc]
          - CFBundleTypeExtensions: [odt]
            CFBundleTypeName: OpenDocument Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes: [org.oasis-open.opendocument.text]
          - CFBundleTypeExtensions: [txt, rtf, md, markdown, csv, json, xml]
            CFBundleTypeName: Text Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes: [public.text, public.plain-text, public.rtf, net.daringfireball.markdown, public.comma-separated-values-text, public.json, public.xml]
          - CFBundleTypeExtensions: [png, jpg, jpeg, gif, tif, tiff, heic, bmp, webp]
            CFBundleTypeName: Image
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes: [public.image, public.png, public.jpeg, com.compuserve.gif, public.tiff, public.heic, com.microsoft.bmp, org.webmproject.webp]
    entitlements:
      path: PDFold/Resources/PDFold.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_NAME: pdFold
        PRODUCT_MODULE_NAME: PDFold
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: PDFold/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PDFold/Resources/PDFold.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_PREVIEWS: YES

  PDFoldTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/PDFoldTests
    dependencies:
      - package: PDFiumBinary
        product: PDFium
      - target: PDFold
    settings:
      base:
        PRODUCT_NAME: PDFoldTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: "$(BUILT_PRODUCTS_DIR)/pdFold.app/Contents/MacOS/pdFold.debug.dylib"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks $(BUILT_PRODUCTS_DIR)/pdFold.app/Contents/MacOS"

schemes:
  PDFold:
    build:
      targets:
        PDFold: all
    test:
      targets:
        - PDFoldTests
